<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>GuideMe — видеть мир ушами</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- TensorFlow и COCO-SSD -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.18.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>👁️ GuideMe</h1>
            <div class="subtitle">видеть мир ушами — голосовой помощник</div>
        </header>

        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="overlay"></canvas>
        </div>

        <div class="controls">
            <button id="cameraToggleBtn" class="primary">▶ Запустить камеру</button>
            <button id="settingsBtn">⚙️ Настройки</button>
        </div>

        <!-- Панель настроек -->
        <div id="settingsPanel" class="settings-panel hidden">
            <h3>Настройки</h3>
            <div class="settings-section">
                <h4>📱 Общие</h4>
                <div class="setting-item">
                    <label for="volume">🔊 Громкость</label>
                    <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
                </div>
            </div>
            <div class="settings-section">
                <h4>⚙️ Системные</h4>
                <div class="setting-item">
                    <button id="calibrateBtn">📏 Калибровка</button>
                </div>
            </div>
            <div class="settings-section">
                <h4>🛠️ Сервис</h4>
                <div class="setting-item">
                    <button id="testVoiceBtn">🔊 Тест голоса</button>
                </div>
            </div>
            <button id="closeSettingsBtn">Готово</button>
        </div>

        <!-- Информационная панель (модель, аудио) -->
        <div class="info-panel">
            <div class="info-item">
                <span class="info-label">Модель:</span>
                <span id="modelStatus">⏳ загрузка...</span>
            </div>
            <div class="info-item">
                <span class="info-label">Аудио:</span>
                <span id="audioStatus">⏳ загрузка</span>
            </div>
            <div class="info-item">
                <span class="info-label">Калибровка:</span>
                <span id="calibStatus">не выполнена</span>
            </div>
        </div>

        <footer>
            <div class="footer">GuideMe alpha 1.9 — голосовой помощник для незрячих</div>
        </footer>
    </div>

    <!-- Core -->
    <script src="js/core/constants.js"></script>
    <script src="js/core/translations.js"></script>
    <script src="js/core/utils.js"></script>
    <script src="js/core/speechgot.js"></script>
    <script src="js/core/voice-command.js"></script>

    <!-- Vision -->
    <script src="js/vision/camera.js"></script>
    <script src="js/vision/detection.js"></script>
    <script src="js/vision/object-tracker.js"></script>

    <!-- Features -->
    <script src="js/features/calibration.js"></script>
    <script src="js/features/safety.js"></script>
    <script src="js/features/navigation.js"></script>

    <!-- Utils -->
    <script src="js/utils/helpers.js"></script>

    <!-- UI -->
    <script src="js/ui/ui-core.js"></script>
    <script src="js/ui/ui-controls.js"></script>
    <script src="js/ui/ui-settings.js"></script>

    <!-- Main -->
    <script src="js/main.js"></script>
</body>
</html>
